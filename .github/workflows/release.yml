name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag (example: v1.0.5)"
        required: true
      prerelease:
        description: "Is this a prerelease?"
        required: true
        type: boolean
      custom_message:
        description: "Optional release body message"
        required: false

permissions:
  contents: write

env:
  RELEASE_NAME: JS Engine - ${{ inputs.tag_name }} Release

jobs:
  ensure-tag:
    name: Create Tag (if needed)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch all tags
        run: git fetch --tags

      - name: Create and push tag if missing
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/${{ inputs.tag_name }}" >/dev/null; then
            echo "Tag already exists: ${{ inputs.tag_name }}"
          else
            git tag "${{ inputs.tag_name }}"
            git push origin "${{ inputs.tag_name }}"
          fi

  build:
    name: Build Artifacts
    needs: ensure-tag
    uses: ./.github/workflows/main.yml
    with:
      buildFlags: officialBuild

  release-linux:
    name: Release linuxBuild
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linuxBuild
          path: build/linux

      - name: Compress build
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full
          7z a -tzip linuxBuild.zip ./build/linux/*

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@2.5.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: linuxBuild.zip
          asset_name: FNF-JS-Engine-linux.zip
          prerelease: ${{ inputs.prerelease }}
          release_name: ${{ env.RELEASE_NAME }}
          body: ${{ inputs.custom_message }}
          overwrite: true

  release-windows:
    name: Release windowsBuild
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windowsBuild
          path: build/windows

      - name: Compress build
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full
          7z a -tzip windowsBuild.zip ./build/windows/*

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@2.5.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: windowsBuild.zip
          asset_name: FNF-JS-Engine-windows.zip
          prerelease: ${{ inputs.prerelease }}
          release_name: ${{ env.RELEASE_NAME }}
          body: ${{ inputs.custom_message }}
          overwrite: true

  release-mac:
    name: Release macBuild
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: macBuild-intel
          path: build/mac-intel

      - name: Compress Intel build
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full
          7z a -tzip macBuild-intel.zip ./build/mac-intel/*

      - name: Upload macBuild-intel
        uses: svenstaro/upload-release-action@2.5.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: macBuild-intel.zip
          asset_name: FNF-JS-Engine-macOS-Intel.zip
          prerelease: ${{ inputs.prerelease }}
          release_name: ${{ env.RELEASE_NAME }}
          body: ${{ inputs.custom_message }}
          overwrite: true

      - name: Download Mac ARM artifact
        uses: actions/download-artifact@v4
        with:
          name: macBuild-arm
          path: build/mac-arm

      - name: Compress ARM build
        run: |
          7z a -tzip macBuild-arm.zip ./build/mac-arm/*

      - name: Upload macBuild-arm
        uses: svenstaro/upload-release-action@2.5.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: macBuild-arm.zip
          asset_name: FNF-JS-Engine-macOS-ARM.zip
          prerelease: ${{ inputs.prerelease }}
          release_name: ${{ env.RELEASE_NAME }}
          body: ${{ inputs.custom_message }}
          overwrite: true
