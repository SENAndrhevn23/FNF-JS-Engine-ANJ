name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

# ===============================
# LINUX BUILD
# ===============================
  buildLinux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libvlccore-dev

          haxelib setup ~/haxelib
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-tools --quiet
          haxelib install hxcpp --quiet

          haxelib run lime setup

      - name: Build Linux
        run: |
          haxelib run lime build linux -D commit

      - uses: actions/upload-artifact@v4
        with:
          name: linuxBuild
          path: export/release/linux/bin

# ===============================
# WINDOWS BUILD
# ===============================
  buildWindows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Install Dependencies
        shell: cmd
        run: |
          haxelib setup C:/haxelib
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-tools --quiet
          haxelib install hxcpp --quiet
          haxelib run lime setup

      - name: Build Windows
        run: |
          haxelib run lime build windows -D commit

      - uses: actions/upload-artifact@v4
        with:
          name: windowsBuild
          path: export/release/windows/bin

# ===============================
# MAC BUILD
# ===============================
  buildMac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Install Dependencies
        run: |
          haxelib setup ~/haxelib
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-tools --quiet
          haxelib install hxcpp --quiet
          haxelib run lime setup

      - name: Build macOS
        run: |
          haxelib run lime build mac -D commit

      - uses: actions/upload-artifact@v4
        with:
          name: macBuild
          path: export/release/macos/bin

# ===============================
# HTML5 BUILD (PLAYABLE WEB VERSION)
# ===============================
  buildHTML5:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Install Dependencies
        run: |
          haxelib setup ~/haxelib
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-tools --quiet
          haxelib install hxcpp --quiet
          haxelib run lime setup

      - name: Build HTML5
        run: |
          haxelib run lime build html5 -D commit

      - uses: actions/upload-artifact@v4
        with:
          name: html5Build
          path: export/release/html5/bin
