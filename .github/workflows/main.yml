name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      # ---------------------------
      # INSTALL HAXE LIBRARIES
      # ---------------------------
      - name: Install Haxe Libraries
        shell: bash
        run: |
          haxelib setup ~/haxelib

          # Install REQUIRED core libs
          yes | haxelib install hxp
          yes | haxelib install lime
          yes | haxelib install openfl
          yes | haxelib install flixel
          yes | haxelib install flixel-tools
          yes | haxelib install hxcpp

          # ⭐ IMPORTANT FIX ⭐
          haxelib set hxp
          haxelib set lime
          haxelib set openfl
          haxelib set flixel
          haxelib set hxcpp

          # Lime environment setup
          haxelib run lime setup

      # ---------------------------
      # BUILD WINDOWS
      # ---------------------------
      - name: Build Windows
        if: runner.os == 'Windows'
        run: haxelib run lime build windows -D commit

      # ---------------------------
      # BUILD LINUX
      # ---------------------------
      - name: Build Linux
        if: runner.os == 'Linux'
        run: haxelib run lime build linux -D commit

      # ---------------------------
      # BUILD MAC
      # ---------------------------
      - name: Build macOS
        if: runner.os == 'macOS'
        run: haxelib run lime build mac -D commit

      # ---------------------------
      # BUILD HTML5 (SAFE SCHOOL VERSION)
      # ---------------------------
      - name: Build HTML5
        if: runner.os == 'Linux'
        run: haxelib run lime build html5 -D commit

      # ---------------------------
      # UPLOAD RESULT
      # ---------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: export/release
